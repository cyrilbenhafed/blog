name: Deploy — Preprod (dev)

on:
  push:
    branches: [dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install R dependencies
        run: |
          install.packages(c("rmarkdown", "knitr"))
        shell: Rscript {0}

      - name: Install Python dependencies
        run: uv sync --frozen

      # ── CI checks ──────────────────────────────────────────────

      - name: Check YAML metadata (categories, date, title)
        run: uv run python _ci/check_metadata.py

      - name: Spell check (Vale — FR)
        uses: errata-ai/vale-action@v2
        with:
          files: "."
          vale_flags: "--config=.vale.ini"
        continue-on-error: true

      # ── Build & Deploy ─────────────────────────────────────────

      - name: Build Quarto site
        run: uv run quarto render

      - name: Deploy to GitHub Pages (preprod)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: preprod
          commit_message: "preprod: ${{ github.sha }}"
