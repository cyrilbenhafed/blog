name: Deploy — Prod (main)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install R dependencies
        run: |
          install.packages(c("rmarkdown", "knitr"))
        shell: Rscript {0}

      - name: Install Python dependencies
        run: uv sync --frozen

      # ── CI checks — blocking in prod ───────────────────────────

      - name: Check YAML metadata (categories, date, title)
        run: uv run python _ci/check_metadata.py

      # ── Build & Deploy ─────────────────────────────────────────

      - name: Build Quarto site
        run: uv run quarto render

      - name: Deploy to GitHub Pages (prod)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: blog.benhafed.com
          commit_message: "prod: ${{ github.sha }}"
